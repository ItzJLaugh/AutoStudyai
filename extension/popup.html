<!DOCTYPE html>
<html>
<head>
  <title>AutoStudyAI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>AutoStudyAI</h1>

  <!-- Auth section -->
  <div id="auth-section">
    <div id="auth-status" style="margin-bottom:8px;font-size:0.9em;color:#888;"></div>
    <div id="auth-login" style="display:none;margin-bottom:10px;">
      <input id="auth-email" type="email" placeholder="Email" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid #ccc;font-size:0.9em;margin-bottom:6px;" />
      <input id="auth-password" type="password" placeholder="Password" style="width:100%;padding:7px 10px;border-radius:6px;border:1px solid #ccc;font-size:0.9em;margin-bottom:6px;" />
      <button id="auth-login-btn" style="width:100%;padding:7px;font-size:0.9em;">Login</button>
      <div id="auth-error" style="color:#e53935;font-size:0.85em;margin-top:4px;"></div>
    </div>
    <div id="auth-logged-in" style="display:none;margin-bottom:10px;">
      <span id="auth-user-email" style="font-size:0.85em;color:#4fc3f7;"></span>
      <button id="auth-logout-btn" style="font-size:0.8em;margin-left:8px;padding:3px 8px;">Logout</button>
    </div>
  </div>

  <button id="capture-btn">Capture Page Content</button>
  <button id="save-guide-btn" style="display:none; margin-left:10px;">Save to Platform</button>
  <div id="status"></div>
  <div id="progress-log" style="display:none;"></div>
  <div id="platform-banner" style="display:none;">
    &#128279; Use your study guide on the platform &rarr;
    <a href="https://autostudyai.online" target="_blank">autostudyai.online</a>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="notes">Notes</button>
    <button class="tab-btn" data-tab="guide">Study Guide</button>
    <button class="tab-btn" data-tab="flashcards">Flashcards</button>
    <button class="tab-btn" data-tab="chat">Chat</button>
  </div>
  <div id="tab-content">
    <div id="notes-section" class="tab-section active"></div>
    <div id="guide-section" class="tab-section"></div>
    <div id="flashcards-section" class="tab-section"></div>
    <div id="chat-section" class="tab-section">
      <div id="chat-history" style="max-height:120px;overflow-y:auto;margin-bottom:8px;"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input id="chat-input" type="text" placeholder="Ask a question about the captured content..." style="flex:1;padding:7px 10px;border-radius:6px;border:1px solid #ccc;font-size:1em;" />
        <button id="chat-send-btn">Send</button>
        <button id="chat-example-btn" style="background:#e3eafc;color:#2a7ae2;">Example</button>
      </div>
      <div id="chat-answer" style="margin-top:10px;"></div>
    </div>
  </div>
  <script src="jszip.min.js"></script>
  <script src="pptxParser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
